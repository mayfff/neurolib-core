spring:
  application:
    name: neurolib
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  config:
    import: optional:file:.env[.properties]
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}

springdoc:
  api-docs:
    path: /api-docs
    enabled: true

  swagger-ui:
    path: /swagger-ui
    enabled: true

server:
  shutdown: graceful

app:
  jwt:
    secret: ${JWT_SECRET:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
    expiration-ms: ${JWT_EXPIRATION_MS:60000}

logging:
  level:
    org.hibernate: ERROR