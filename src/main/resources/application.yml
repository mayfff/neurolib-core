spring:
  application:
    name: neurolib
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  config:
    import: optional:file:.env[.properties]
  datasource:
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  jwt:
    secret: ${JWT_SECRET:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA}
    expiration-ms: ${JWT_EXPIRATION_MS:60000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:600000}

  aws:
    s3:
      path: ${AWS_S3_PATH}
      region: ${AWS_REGION:eu-central-1}
      bucket-name: ${AWS_BUCKET:neurolib}
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

springdoc:
  api-docs:
    path: /api-docs
    enabled: true

  swagger-ui:
    path: /swagger-ui
    enabled: true

server:
  shutdown: graceful

logging:
  level:
    org.hibernate: ERROR
